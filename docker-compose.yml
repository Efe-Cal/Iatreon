services:
  redis:
    image: redis:7-alpine

  pdf-api:
    build:
      context: .
      dockerfile: pdf_worker/Dockerfile.api
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - downloads:/app/downloads
    command: ["uvicorn", "pdf_worker.api:app", "--host", "0.0.0.0", "--port", "8000"]

  pdf-worker:
    build:
      context: .
      dockerfile: pdf_worker/Dockerfile.worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    volumes:
      - downloads:/app/downloads
      - worker-profile:/app/pdf_worker/chrome_profile

  backend-api:
    build:
      context: .
      dockerfile: backend_api/Dockerfile
    environment:
      HCAI_API_KEY: ${HCAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-604800}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-2592000}
      BACKEND_API_DB_URL: postgresql+asyncpg://backend_api:backend_api@backend-db:5432/backend_api
      PDF_WORKER_BASE_URL: http://pdf-api:8000
    depends_on:
      backend-db:
        condition: service_healthy
      pdf-api:
        condition: service_started
    ports:
      - "8787:8787"
    command: ["uvicorn", "backend_api.main:app", "--host", "0.0.0.0", "--port", "8787", "--no-access-log"]

  backend-db:
    image: postgres:16
    environment:
      POSTGRES_USER: backend_api
      POSTGRES_PASSWORD: backend_api
      POSTGRES_DB: backend_api
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend_api -d backend_api"]
      interval: 30s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes: [backend-api-data:/var/lib/postgresql/data]

volumes:
  downloads:
  worker-profile:
  backend-api-data:
