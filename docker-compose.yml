services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  pdf-api:
    build:
      context: .
      dockerfile: pdf_worker/Dockerfile.api
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - downloads:/app/downloads
    command: ["uvicorn", "pdf_worker.api:app", "--host", "0.0.0.0", "--port", "8000"]

  pdf-worker:
    build:
      context: .
      dockerfile: pdf_worker/Dockerfile.worker
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    volumes:
      - downloads:/app/downloads
      - worker-profile:/app/pdf_worker/chrome_profile

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/app
      PDF_SCRAPER_BASE_URL: http://pdf-api:8000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-me}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-15}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-180}
    depends_on:
      db:
        condition: service_healthy
      pdf-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "8001:8000"

  tui:
    build:
      context: ./tui
    environment:
      API_BASE_URL: http://api:8000
      SSH_AUTH_SOCK: /ssh-agent
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${TUI_SSH_PORT:-2222}:2222"
    volumes:
      - ${SSH_AUTH_SOCK:-/tmp/ssh-agent.sock}:/ssh-agent
      - ./data:/data

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 30s
      timeout: 5s
      retries: 5
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

volumes:
  downloads:
  worker-profile:
  pgdata:
